<!doctype html>
<html>
<head>
  <title>Email Setup - जन-सेवा पोर्टल</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #1e293b; padding: 40px; border-radius: 16px; max-width: 500px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    h2 { color: #e67e22; margin-bottom: 16px; }
    p { color: #94a3b8; line-height: 1.6; }
    .key-box { background: #0f172a; padding: 16px; border-radius: 8px; margin: 20px 0; font-family: monospace; font-size: 1.1rem; color: #22c55e; word-break: break-all; }
    .status { margin: 20px 0; font-size: 1.1rem; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #e67e22; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="box">
    <h2>📧 Email Notification Setup</h2>
    <p>जन-सेवा पोर्टल के लिए ईमेल नोटिफिकेशन सेटअप हो रहा है...</p>
    <div class="status" id="status"><div class="spinner"></div> <br>कृपया प्रतीक्षा करें...</div>
    <div class="key-box" id="keyBox" style="display:none"></div>
  </div>

  <script>
    async function setupEmail() {
      const status = document.getElementById('status');
      const keyBox = document.getElementById('keyBox');
      
      try {
        // Step 1: Get access key
        status.innerHTML = '<div class="spinner"></div><br>Web3Forms से Access Key प्राप्त हो रही है...';
        
        const response = await fetch("https://api.web3forms.com/key", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: "jilapanchayat02@gmail.com",
            name: "Harishankar Nishad Portal"
          })
        });

        const data = await response.json();
        
        if (data.success && data.key) {
          keyBox.textContent = data.key;
          keyBox.style.display = 'block';
          status.innerHTML = '<span class="success">✅ सेटअप सफल!</span><br><br>Access Key ऊपर दिख रही है। कृपया इस पेज का स्क्रीनशॉट ले लें या key को कॉपी कर लें।<br><br><strong>अब आप इस टैब को बंद कर सकते हैं।</strong>';
          
          // Send key to console for easy copy
          console.log("=== WEB3FORMS ACCESS KEY ===");
          console.log(data.key);
          console.log("============================");
        } else {
          status.innerHTML = '<span class="error">❌ Key प्राप्त नहीं हो सकी।</span><br>' + JSON.stringify(data);
        }
      } catch (error) {
        status.innerHTML = '<span class="error">❌ त्रुटि: ' + error.message + '</span>';
      }
    }
    
    setupEmail();
  </script>
</body>
</html>
